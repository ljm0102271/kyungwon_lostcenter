<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경원고등학교 분실물 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref as dbRef, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // 🔥 TODO: 선생님의 Firebase 프로젝트 설정값으로 대치해주세요!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL", // 👈 Realtime DB는 이 주소가 반드시 필요합니다! 콘솔 상단에 있는 https://... 주소를 넣어주세요.
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        window.currentTab = 'found';
        
        window.switchTab = function(tab) {
            window.currentTab = tab;
            const foundTabBtn = document.getElementById('foundTabBtn');
            const lostTabBtn = document.getElementById('lostTabBtn');
            const formTitle = document.getElementById('formTitle');
            const locLabel = document.getElementById('locLabel');
            const holderLabel = document.getElementById('holderLabel');

            if (tab === 'found') {
                foundTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tl-xl transition";
                lostTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tr-xl transition";
                formTitle.innerText = "✨ 분실물 등록";
                locLabel.innerText = "📍 습득 장소";
                holderLabel.innerText = "🎒 현재 보관 장소";
            } else {
                foundTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tl-xl transition";
                lostTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tr-xl transition";
                formTitle.innerText = "🔍 분실물 찾기";
                locLabel.innerText = "📍 분실 예상 장소";
                holderLabel.innerText = "👤 분실자 이름 / 학년-반";
            }
            loadData();
        }

        window.openModal = function() {
            document.getElementById('uploadModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        window.closeModal = function() {
            document.getElementById('uploadModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('postForm').reset();
        }

        // 데이터 등록 (Realtime DB 업로드)
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "업로드 중...";

            const title = document.getElementById('itemTitle').value;
            const date = document.getElementById('itemDate').value;
            const location = document.getElementById('itemLocation').value;
            const holder = document.getElementById('itemHolder').value;
            const contact = document.getElementById('itemContact').value;
            const desc = document.getElementById('itemDesc').value;
            const fileInput = document.getElementById('itemImage');
            
            let imageUrl = "";

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const sRef = storageRef(storage, 'lost_and_found/' + Date.now() + '_' + file.name);
                    const snapshot = await uploadBytes(sRef, file);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                // Realtime DB에 데이터 밀어넣기
                const postsRef = dbRef(db, 'posts');
                const newPostRef = push(postsRef);
                await set(newPostRef, {
                    type: window.currentTab,
                    title: title,
                    date: date,
                    location: location,
                    holder: holder,
                    contact: contact,
                    desc: desc,
                    imageUrl: imageUrl,
                    createdAt: Date.now()
                });

                alert("게시글이 성공적으로 등록되었습니다!");
                closeModal();
            } catch (error) {
                console.error("에러 발생: ", error);
                alert("등록에 실패했습니다. 코드를 다시 확인해주세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "등록하기";
            }
        });

        // Realtime DB 실시간 데이터 동기화 조회
        function loadData() {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>데이터를 불러오는 중입니다...</div>';

            const postsRef = dbRef(db, 'posts');
            
            onValue(postsRef, (snapshot) => {
                grid.innerHTML = "";
                let count = 0;
                const dataVal = snapshot.val();

                if (!dataVal) {
                    renderEmpty();
                    return;
                }

                // 최신순 정렬을 위해 배열화
                const postList = Object.keys(dataVal).map(key => dataVal[key]);
                postList.sort((a, b) => b.createdAt - a.createdAt);

                postList.forEach((data) => {
                    if (data.type === window.currentTab) {
                        count++;
                        const card = document.createElement('div');
                        card.className = "bg-white rounded-xl shadow-md overflow-hidden hover:shadow-lg transition duration-300 flex flex-col justify-between";
                        
                        const imageArea = data.imageUrl 
                            ? `<div class="h-48 bg-gray-100 overflow-hidden"><img src="${data.imageUrl}" class="w-full h-full object-cover"></div>`
                            : `<div class="h-48 bg-gradient-to-br from-indigo-50 to-slate-100 flex items-center justify-center text-indigo-300"><i class="${data.type === 'found' ? 'fas fa-box-open' : 'fas fa-search'} text-5xl"></i></div>`;

                        let contactBtnHTML = "";
                        if (data.contact) {
                            if (data.contact.includes('instagram.com') || (!data.contact.includes('-') && !data.contact.startsWith('010') && data.contact.startsWith('@'))) {
                                const cleanId = data.contact.replace('@','');
                                contactBtnHTML = `<a href="https://instagram.com/${cleanId}" target="_blank" class="w-full text-center bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-sm font-bold py-2.5 px-4 rounded-lg transition inline-block"><i class="fab fa-instagram mr-1.5"></i>인스타 DM 보내기</a>`;
                            } else {
                                contactBtnHTML = `<a href="sms:${data.contact}" class="w-full text-center bg-teal-500 hover:bg-teal-600 text-white text-sm font-bold py-2.5 px-4 rounded-lg transition inline-block"><i class="fas fa-comment-alt mr-1.5"></i>문자 보내기</a>`;
                            }
                        }

                        card.innerHTML = `
                            <div>
                                ${imageArea}
                                <div class="p-5">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="px-2.5 py-1 ${data.type === 'found' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} text-xs font-semibold rounded-full">
                                            ${data.type === 'found' ? '찾았습니다' : '찾고있어요'}
                                        </span>
                                        <span class="text-xs text-gray-400"><i class="far fa-calendar-alt mr-1"></i>${data.date}</span>
                                    </div>
                                    <h3 class="text-base md:text-lg font-bold text-gray-900 mb-2 line-clamp-1">${data.title}</h3>
                                    <p class="text-sm text-gray-600 mb-4 line-clamp-2 min-h-[40px]">${data.desc || '상세 설명이 존재하지 않습니다.'}</p>
                                    
                                    <div class="space-y-1.5 border-t pt-3 border-gray-100 text-xs text-gray-600">
                                        <div class="flex"><span class="w-20 font-semibold text-gray-400">📍 위치:</span> <span class="text-gray-800">${data.location}</span></div>
                                        <div class="flex"><span class="w-20 font-semibold text-gray-400">${data.type === 'found' ? '🎒 보관처:' : '👤 분실자:'}</span> <span class="text-gray-800">${data.holder}</span></div>
                                    </div>
                                </div>
                            </div>
                            <div class="px-5 pb-5">
                                ${contactBtnHTML}
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });

                if (count === 0) renderEmpty();
            });
        }

        function renderEmpty() {
            document.getElementById('itemGrid').innerHTML = `
                <div class="col-span-full text-center py-16 bg-white rounded-xl shadow-sm border border-dashed border-gray-200">
                    <i class="fas fa-folder-open text-gray-300 text-5xl mb-3"></i>
                    <p class="text-gray-500 text-sm">현재 카테고리에 등록된 게시글이 없습니다.</p>
                </div>
            `;
        }

        window.searchItems = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementById('itemGrid').children;
            
            for (let card of cards) {
                if(card.classList.contains('col-span-full')) continue;
                const innerText = card.innerText.toLowerCase();
                if (innerText.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🏫</span>
                <h1 class="text-lg md:text-xl font-extrabold tracking-tight">경원고등학교 분실물 센터</h1>
            </div>
            </span>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-6 md:py-10">
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 mb-6 md:mb-8 overflow-hidden">
            <div class="flex border-b border-gray-100">
                <button id="foundTabBtn" onclick="switchTab('found')" class="flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tl-xl transition">
                    <i class="fas fa-box-open mr-2"></i>분실물 찾았어요
                </button>
                <button id="lostTabBtn" onclick="switchTab('lost')" class="flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tr-xl transition">
                    <i class="fas fa-search mr-2"></i>붑실물 찾고있어요
                </button>
            </div>
            
            <div class="p-4 flex flex-col sm:flex-row gap-3 justify-between items-center bg-slate-50/50">
                <div class="relative w-full sm:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="fas fa-search text-sm"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="searchItems()" placeholder="물건명, 장소 등을 검색..." 
                           class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white">
                </div>
                <button onclick="openModal()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-5 rounded-lg text-sm transition shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> 분실물 글쓰기 등록
                </button>
            </div>
        </div>

        <div id="itemGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="uploadModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col">
            <div class="bg-indigo-600 px-5 py-4 text-white flex justify-between items-center">
                <h2 id="formTitle" class="font-bold text-base md:text-lg">✨ 새로운 분실물 등록 (찾았습니다)</h2>
                <button onclick="closeModal()" class="text-white/80 hover:text-white transition text-xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="postForm" class="p-5 space-y-4 overflow-y-auto flex-grow text-sm">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">🎁 물건 이름</label>
                    <input type="text" id="itemTitle" required placeholder="예: 무선 이어폰, 노란 필통, 교복 마이" 
                           class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">📅 발견/분실 일자</label>
                        <input type="date" id="itemDate" required 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label id="locLabel" class="block text-xs font-bold text-gray-500 mb-1">📍 습득 장소</label>
                        <input type="text" id="itemLocation" required placeholder="예: 본관 2층 홈베이스 소파" 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label id="holderLabel" class="block text-xs font-bold text-gray-500 mb-1">🎒 현재 보관 장소</label>
                        <input type="
