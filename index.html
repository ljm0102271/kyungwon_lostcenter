<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경원고등학교 분실물 센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref as dbRef, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // 🔥 TODO: 선생님의 Firebase 프로젝트 설정값으로 꼭 대치해주세요!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL", // 👈 실시간 DB 상단의 https://... 주소를 여기에 넣어주세요!
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // 글로벌 데이터 보관소
        window.currentTab = 'found';
        window.allPosts = [];
        
        // 카테고리 탭 전환
        window.switchTab = function(tab) {
            window.currentTab = tab;
            const foundTabBtn = document.getElementById('foundTabBtn');
            const lostTabBtn = document.getElementById('lostTabBtn');
            const formTitle = document.getElementById('formTitle');
            const locLabel = document.getElementById('locLabel');
            const holderLabel = document.getElementById('holderLabel');

            if (tab === 'found') {
                foundTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tl-xl transition";
                lostTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tr-xl transition";
                formTitle.innerText = "✨ 새로운 분실물 등록 (찾았습니다)";
                locLabel.innerText = "📍 습득 장소";
                holderLabel.innerText = "🎒 현재 보관 장소";
            } else {
                foundTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tl-xl transition";
                lostTabBtn.className = "flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tr-xl transition";
                formTitle.innerText = "🔍 잃어버린 물건 찾기 (찾고있어요)";
                locLabel.innerText = "📍 분실 예상 장소";
                holderLabel.innerText = "👤 분실자 이름 / 학년-반";
            }
            renderData();
        }

        // 등록 모달 창 제어
        window.openModal = function() {
            document.getElementById('uploadModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        window.closeModal = function() {
            document.getElementById('uploadModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('postForm').reset();
        }
        
        // 💡 [신규] 카드 클릭 시 작동하는 상세조회 모달 팝업 제어
        window.openDetailModal = function(index) {
            const data = window.allPosts[index];
            if (!data) return;

            document.getElementById('detailTitle').innerText = data.title;
            document.getElementById('detailBadge').innerText = data.type === 'found' ? '찾았습니다' : '찾고있어요';
            document.getElementById('detailBadge').className = `px-2.5 py-1 ${data.type === 'found' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} text-xs font-semibold rounded-full`;
            document.getElementById('detailDate').innerText = data.date;
            document.getElementById('detailLocation').innerText = data.location;
            document.getElementById('detailHolderLabel').innerText = data.type === 'found' ? '🎒 보관처:' : '👤 분실자:';
            document.getElementById('detailHolder').innerText = data.holder;
            document.getElementById('detailDesc').innerText = data.desc || '상세 설명이 존재하지 않습니다.';
            
            // 이미지 뷰어 처리
            const imgContainer = document.getElementById('detailImageContainer');
            if (data.imageUrl) {
                imgContainer.innerHTML = `<img src="${data.imageUrl}" class="w-full max-h-80 object-contain rounded-lg border border-slate-100 shadow-sm">`;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.innerHTML = '';
                imgContainer.classList.add('hidden');
            }

            // 하단 다이렉트 소통 버튼 연동
            const contactAction = document.getElementById('detailContactAction');
            if (data.contact) {
                contactAction.classList.remove('hidden');
                if (data.contact.includes('instagram.com') || (!data.contact.includes('-') && !data.contact.startsWith('010') && data.contact.startsWith('@'))) {
                    const cleanId = data.contact.replace('@','');
                    contactAction.innerHTML = `<a href="https://instagram.com/${cleanId}" target="_blank" class="w-full text-center bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2 text-base shadow-md"><i class="fab fa-instagram text-xl"></i> 발견자/분실자와 인스타 DM으로 소통하기</a>`;
                } else {
                    contactAction.innerHTML = `<a href="sms:${data.contact}" class="w-full text-center bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-xl transition flex items-center justify-center gap-2 text-base shadow-md"><i class="fas fa-comment-alt text-lg"></i> 발견자/분실자와 문자로 소통하기</a>`;
                }
            } else {
                contactAction.classList.add('hidden');
            }

            document.getElementById('detailModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        window.closeDetailModal = function() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 글 등록 기능
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "업로드 중...";

            const title = document.getElementById('itemTitle').value;
            const date = document.getElementById('itemDate').value;
            const location = document.getElementById('itemLocation').value;
            const holder = document.getElementById('itemHolder').value;
            const contact = document.getElementById('itemContact').value;
            const desc = document.getElementById('itemDesc').value;
            const fileInput = document.getElementById('itemImage');
            
            let imageUrl = "";

            try {
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const sRef = storageRef(storage, 'lost_and_found/' + Date.now() + '_' + file.name);
                    const snapshot = await uploadBytes(sRef, file);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                const postsRef = dbRef(db, 'posts');
                const newPostRef = push(postsRef);
                await set(newPostRef, {
                    type: window.currentTab,
                    title: title,
                    date: date,
                    location: location,
                    holder: holder,
                    contact: contact,
                    desc: desc,
                    imageUrl: imageUrl,
                    createdAt: Date.now()
                });

                alert("게시글이 성공적으로 등록되었습니다!");
                closeModal();
            } catch (error) {
                console.error("에러 발생: ", error);
                alert("등록에 실패했습니다. 파이어베이스 설정을 다시 확인해주세요.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "등록하기";
            }
        });

        // Realtime DB 실시간 스트리밍 구독 및 정렬
        function initRealtimeDatabase() {
            const postsRef = dbRef(db, 'posts');
            onValue(postsRef, (snapshot) => {
                const dataVal = snapshot.val();
                window.allPosts = [];

                if (dataVal) {
                    const list = Object.keys(dataVal).map(key => dataVal[key]);
                    list.sort((a, b) => b.createdAt - a.createdAt); // 최신순 정렬
                    window.allPosts = list;
                }
                renderData();
            });
        }

        // 실시간 대시보드 카드 렌더링
        function renderData() {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = "";
            let count = 0;

            if (window.allPosts.length === 0) {
                renderEmpty();
                return;
            }

            window.allPosts.forEach((data, index) => {
                if (data.type === window.currentTab) {
                    count++;
                    const card = document.createElement('div');
                    // 💡 마우스를 올리면 뜨고 포인터 커서로 바뀌어 클릭할 수 있음을 직관적으로 시각화했습니다.
                    card.className = "bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col justify-between cursor-pointer border border-slate-100 group";
                    card.setAttribute('onclick', `openDetailModal(${index})`);
                    
                    const imageArea = data.imageUrl 
                        ? `<div class="h-48 bg-gray-100 overflow-hidden relative"><img src="${data.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300"><div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition"></div></div>`
                        : `<div class="h-48 bg-gradient-to-br from-indigo-50 to-slate-100 flex items-center justify-center text-indigo-300 group-hover:from-indigo-100 transition"><i class="${data.type === 'found' ? 'fas fa-box-open' : 'fas fa-search'} text-5xl"></i></div>`;

                    card.innerHTML = `
                        <div>
                            ${imageArea}
                            <div class="p-5">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="px-2.5 py-1 ${data.type === 'found' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'} text-xs font-semibold rounded-full">
                                        ${data.type === 'found' ? '찾았습니다' : '찾고있어요'}
                                    </span>
                                    <span class="text-xs text-gray-400"><i class="far fa-calendar-alt mr-1"></i>${data.date}</span>
                                </div>
                                <h3 class="text-base md:text-lg font-bold text-gray-900 mb-1 group-hover:text-indigo-600 transition line-clamp-1">${data.title}</h3>
                                <p class="text-sm text-gray-500 mb-4 line-clamp-2 min-h-[40px]">${data.desc || '상세 설명이 존재하지 않습니다.'}</p>
                                
                                <div class="space-y-1.5 border-t pt-3 border-gray-100 text-xs text-gray-600">
                                    <div class="flex"><span class="w-20 font-semibold text-gray-400">📍 위치:</span> <span class="text-gray-800 line-clamp-1">${data.location}</span></div>
                                    <div class="flex"><span class="w-20 font-semibold text-gray-400">${data.type === 'found' ? '🎒 보관처:' : '👤 분실자:'}</span> <span class="text-gray-800 line-clamp-1">${data.holder}</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="px-5 pb-5 pt-1 text-center">
                            <span class="inline-block w-full text-center bg-slate-50 border border-slate-200 text-slate-600 text-xs font-bold py-2 px-3 rounded-lg group-hover:bg-indigo-50 group-hover:text-indigo-600 group-hover:border-indigo-200 transition"><i class="fas fa-eye mr-1.5"></i>자세히 보기 및 연락하기</span>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (count === 0) renderEmpty();
        }

        function renderEmpty() {
            document.getElementById('itemGrid').innerHTML = `
                <div class="col-span-full text-center py-16 bg-white rounded-xl shadow-sm border border-dashed border-gray-200">
                    <i class="fas fa-folder-open text-gray-300 text-5xl mb-3"></i>
                    <p class="text-gray-500 text-sm">현재 카테고리에 등록된 게시글이 없습니다.</p>
                </div>
            `;
        }

        // 검색 처리 함수
        window.searchItems = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementById('itemGrid').children;
            
            for (let card of cards) {
                if(card.classList.contains('col-span-full')) continue;
                const innerText = card.innerText.toLowerCase();
                if (innerText.includes(query)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initRealtimeDatabase();
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🏫</span>
                <h1 class="text-lg md:text-xl font-extrabold tracking-tight">경원고등학교 분실물 센터</h1>
            </div>
            <span class="text-xs md:text-sm bg-indigo-700 px-3 py-1 rounded-full text-indigo-100 font-medium hidden sm:inline-block">
                🤝 우리들의 소중한 연결망
            </span>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-6 md:py-10">
        <div class="bg-white rounded-xl shadow-sm border border-slate-100 mb-6 md:mb-8 overflow-hidden">
            <div class="flex border-b border-gray-100">
                <button id="foundTabBtn" onclick="switchTab('found')" class="flex-1 py-3.5 text-center font-bold border-b-4 border-indigo-600 text-indigo-600 bg-indigo-50/50 rounded-tl-xl transition">
                    <i class="fas fa-box-open mr-2"></i>주인을 찾습니다 (찾았습니다)
                </button>
                <button id="lostTabBtn" onclick="switchTab('lost')" class="flex-1 py-3.5 text-center font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-tr-xl transition">
                    <i class="fas fa-search mr-2"></i>물건을 찾습니다 (찾고있어요)
                </button>
            </div>
            
            <div class="p-4 flex flex-col sm:flex-row gap-3 justify-between items-center bg-slate-50/50">
                <div class="relative w-full sm:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                        <i class="fas fa-search text-sm"></i>
                    </span>
                    <input type="text" id="searchInput" onkeyup="searchItems()" placeholder="물건명, 장소 등을 검색..." 
                           class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white">
                </div>
                <button onclick="openModal()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-5 rounded-lg text-sm transition shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> 분실물 글쓰기 등록
                </button>
            </div>
        </div>

        <div id="itemGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="uploadModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col">
            <div class="bg-indigo-600 px-5 py-4 text-white flex justify-between items-center">
                <h2 id="formTitle" class="font-bold text-base md:text-lg">✨ 새로운 분실물 등록 (찾았습니다)</h2>
                <button onclick="closeModal()" class="text-white/80 hover:text-white transition text-xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="postForm" class="p-5 space-y-4 overflow-y-auto flex-grow text-sm">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">🎁 물건 이름</label>
                    <input type="text" id="itemTitle" required placeholder="예: 무선 이어폰, 노란 필통, 교복 마이" 
                           class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">📅 발견/분실 일자</label>
                        <input type="date" id="itemDate" required 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label id="locLabel" class="block text-xs font-bold text-gray-500 mb-1">📍 습득 장소</label>
                        <input type="text" id="itemLocation" required placeholder="예: 본관 2층 홈베이스 소파" 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label id="holderLabel" class="block text-xs font-bold text-gray-500 mb-1">🎒 현재 보관 장소</label>
                        <input type="text" id="itemHolder" required placeholder="예: 1학년 교무실 홍길동 선생님께" 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1">💬 연락 가능한 수단</label>
                        <input type="text" id="itemContact" required placeholder="예: 인스타ID(@아이디) 또는 010-XXXX" 
                               class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">📝 특징 및 세부 설명</label>
                    <textarea id="itemDesc" rows="3" placeholder="주인을 특정하는 데 도움이 될 만한 상세 특징을 기록해주세요." 
                              class="w-full border border-slate-200 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">📸 현장 증거 이미지 파일</label>
                    <input type="file" id="itemImage" accept="image/*" 
                           class="w-full text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                </div>
                <div class="flex gap-2 pt-2 border-t">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 rounded-lg transition">취소</button>
                    <button type="submit" id="submitBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition shadow-md">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden max-h-[90vh] flex flex-col">
            <div class="bg-slate-100 px-5 py-4 border-b flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span id="detailBadge"></span>
                    <h2 id="detailTitle" class="font-extrabold text-base md:text-lg text-slate-900 tracking-tight"></h2>
                </div>
                <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600 transition text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5 overflow-y-auto flex-grow text-sm">
                <div id="detailImageContainer" class="w-full flex justify-center bg-slate-50 rounded-lg p-2 hidden"></div>
                
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 space-y-2.5 text-slate-700">
                    <div class="flex items-start"><span class="w-24 font-bold text-slate-400 shrink-0">📅 일자:</span> <span id="detailDate" class="text-slate-900 font-medium"></span></div>
                    <div class="flex items-start"><span class="w-24 font-bold text-slate-400 shrink-0">📍 위치/장소:</span> <span id="detailLocation" class="text-slate-900 font-medium"></span></div>
                    <div class="flex items-start"><span id="detailHolderLabel" class="w-24 font-bold text-slate-400 shrink-0"></span> <span id="detailHolder" class="text-slate-900 font-medium"></span></div>
                </div>

                <div class="space-y-1.5">
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">📝 물건 설명 및 주요 특징</h4>
                    <div id="detailDesc" class="bg-white border border-slate-100 p-4 rounded-xl text-slate-700 leading-relaxed min-h-[60px] whitespace-pre-wrap"></div>
                </div>

                <div id="detailContactAction" class="pt-2"></div>
            </div>
            <div class="bg-slate-50 px-5 py-3 border-t flex justify-end">
                <button type="button" onclick="closeDetailModal()" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 px-5 rounded-lg transition text-xs shadow-sm">확인 및 창 닫기</button>
            </div>
        </div>
    </div>

    <footer class="bg-slate-800 text-slate-400 text-center py-4 text-xs md:text-sm mt-auto">
        <p>© 2026 경원고등학교 학생자치위원회 분실물 매칭 허브센터.</p>
    </footer>

</body>
</html>
